[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests
    integration: Integration & agent flow tests
    regression: Regression & actuarial compliance tests
    performance: Performance & execution duration tests
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:anyio.*
